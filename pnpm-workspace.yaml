blockExoticSubdeps: false

packages:
  - "packages/*"

onlyBuiltDependencies:
  - "@avail-project/ca-common"
  - "@avail-project/nexus-core"
  - "@avail-project/nexus-types"
  - bufferutil
  - core-js
  - esbuild
  - keccak
  - msgpackr-extract
  - msw
  - protobufjs
  - secp256k1
  - sharp
  - unrs-resolver
  - utf-8-validate

overrides:
  "@types/react": "19.1.2"
  "@types/react-dom": "19.1.2"
  "axios": ">=1.15.0"

minimumReleaseAgeExclude:
  - "@avail-project/ca-common@2.3.0"
  - "@posthog/core@1.30.6"
  - "@posthog/types@1.379.3"
  - posthog-js@1.379.3

allowBuilds:
  '@avail-project/nexus-core@https://codeload.github.com/availproject/nexus-sdk/tar.gz/186e1ba010d45cebd06516be71116c21e35d202f': set this to true or false
  '@avail-project/nexus-types': set this to true or false
  bufferutil: set this to true or false
  core-js: set this to true or false
  esbuild: set this to true or false
  keccak: set this to true or false
  msw: set this to true or false
  sharp: set this to true or false
  unrs-resolver: set this to true or false
  utf-8-validate: set this to true or false
